# Hyprlock Gothic Gold Theme Configuration
source = ~/.config/hypr/colors.conf

background {
    monitor =
    path = /home/mello/.config/hypr/wallpapers/gothic-golden-crown-frame.jpg
    blur_passes = 3
    blur_size = 6
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.5000  # Darkened for contrast
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(212, 175, 55, 1.0) # Antique Gold
    inner_color = rgba(8, 8, 8, 0.8) # Deep black
    font_color = rgba(245, 245, 220, 1.0) # Cream
    fade_on_empty = true
    placeholder_text = <span foreground="##cdaf7d">Enter passcode...</span>
    hide_input = false
    position = 0, -40
    halign = center
    valign = center
}

# Clock
label {
    monitor =
    text = $TIME
    color = rgba(212, 175, 55, 1.0) # Antique Gold
    font_size = 80
    font_family = Outfit, Inter, FiraCode Nerd Font, Monospace
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.6)
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b>$(date +'%A, %-d %B %Y')</b>"
    color = rgba(245, 245, 220, 0.8) # Cream
    font_size = 20
    font_family = Outfit, Inter, FiraCode Nerd Font, Monospace
    position = 0, 50
    halign = center
    valign = center
    shadow_passes = 1
    shadow_color = rgba(0, 0, 0, 0.6)
}
